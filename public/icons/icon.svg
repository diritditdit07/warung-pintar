<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c2d12" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Warung roof / awning shape -->
  <path d="M80 195 L256 120 L432 195 L432 215 Q256 230 80 215 Z" fill="#fff7ed" opacity="0.95"/>
  <!-- Roof stripes -->
  <path d="M80 207 L432 207" stroke="#fed7aa" stroke-width="8"/>
  <path d="M144 160 L144 215" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>
  <path d="M208 132 L208 222" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>
  <path d="M256 120 L256 226" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>
  <path d="M304 132 L304 222" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>
  <path d="M368 160 L368 215" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>

  <!-- Cash register body -->
  <rect x="148" y="220" width="216" height="158" rx="18" fill="#fff7ed" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="168" y="238" width="176" height="72" rx="10" fill="#1e3a5f"/>
  <!-- Screen glow line -->
  <rect x="168" y="238" width="176" height="4" rx="2" fill="#60a5fa" opacity="0.6"/>

  <!-- Rp text on screen -->
  <text x="256" y="282" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">Rp</text>

  <!-- Keypad dots -->
  <circle cx="188" cy="332" r="10" fill="#f97316"/>
  <circle cx="220" cy="332" r="10" fill="#f97316"/>
  <circle cx="252" cy="332" r="10" fill="#f97316"/>
  <circle cx="284" cy="332" r="10" fill="#f97316"/>
  <circle cx="316" cy="332" r="10" fill="#f97316"/>
  <circle cx="348" cy="332" r="10" fill="#16a34a"/>

  <!-- Drawer line -->
  <rect x="148" y="362" width="216" height="16" rx="8" fill="#fdba74"/>

  <!-- Brand name -->
  <text x="256" y="428" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">KASIR</text>
  <text x="256" y="475" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fed7aa" text-anchor="middle" letter-spacing="3">WARUNG</text>
</svg>