<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7c2d12" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Full bleed background (maskable requires full-bleed) -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Warung roof / awning shape -->
  <path d="M90 210 L256 138 L422 210 L422 228 Q256 242 90 228 Z" fill="#fff7ed" opacity="0.95"/>
  <path d="M90 220 L422 220" stroke="#fed7aa" stroke-width="7"/>
  <path d="M256 138 L256 238" stroke="#fed7aa" stroke-width="5" opacity="0.5"/>
  <path d="M180 170 L180 234" stroke="#fed7aa" stroke-width="4" opacity="0.4"/>
  <path d="M332 170 L332 234" stroke="#fed7aa" stroke-width="4" opacity="0.4"/>

  <!-- Cash register body -->
  <rect x="156" y="248" width="200" height="148" rx="16" fill="#fff7ed" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="174" y="264" width="164" height="66" rx="9" fill="#1e3a5f"/>
  <rect x="174" y="264" width="164" height="4" rx="2" fill="#60a5fa" opacity="0.6"/>
  <text x="256" y="305" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">Rp</text>

  <!-- Keypad -->
  <circle cx="192" cy="352" r="9" fill="#f97316"/>
  <circle cx="220" cy="352" r="9" fill="#f97316"/>
  <circle cx="248" cy="352" r="9" fill="#f97316"/>
  <circle cx="276" cy="352" r="9" fill="#f97316"/>
  <circle cx="304" cy="352" r="9" fill="#f97316"/>
  <circle cx="332" cy="352" r="9" fill="#16a34a"/>

  <!-- Drawer -->
  <rect x="156" y="380" width="200" height="16" rx="8" fill="#fdba74"/>

  <!-- Brand name -->
  <text x="256" y="440" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">KASIR</text>
  <text x="256" y="482" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fed7aa" text-anchor="middle" letter-spacing="3">WARUNG</text>
</svg>